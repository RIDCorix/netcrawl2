[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "netcrawl-sdk"
version = "0.2.0"
description = "Python SDK for NetCrawl — the programmable idle game"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = []
authors = [
    {name = "NetCrawl"},
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Topic :: Games/Entertainment",
]

[project.urls]
Homepage = "https://github.com/Starscribers/netcrawl-workspace"

[project.optional-dependencies]
dev = ["pytest"]

[tool.setuptools.packages.find]
where = ["."]
include = ["netcrawl*"]
